<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>JEDAI Discord Analytics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+JP:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      /* Theme tokens live in @databricks/appkit-ui + client/src/app.css (oklch). */

      html {
        font-size: 17px;
      }

      html,
      body,
      #root {
        width: 100%;
        max-width: 100%;
        min-height: 100%;
      }

      body {
        margin: 0;
        font-family: "Inter", "Noto Sans JP", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      h1,
      h2,
      h3,
      h4,
      h5,
      h6 {
        font-family: "Inter", "Noto Sans JP", sans-serif;
        font-weight: 600;
        letter-spacing: -0.01em;
      }

      pre,
      code {
        font-family: "JetBrains Mono", ui-monospace, monospace;
      }

      .chart-readable .recharts-cartesian-axis-tick-value,
      .chart-readable .recharts-legend-item-text,
      .chart-readable .recharts-label,
      .chart-readable .recharts-text,
      .chart-readable .recharts-tooltip-label,
      .chart-readable .recharts-tooltip-item {
        fill: #475569 !important;
        color: #475569 !important;
        font-size: 14px !important;
      }

      .chart-readable .recharts-cartesian-grid line {
        stroke: rgba(148, 163, 184, 0.35) !important;
      }

      .chart-readable .recharts-xAxis .recharts-cartesian-axis-line,
      .chart-readable .recharts-yAxis .recharts-cartesian-axis-line,
      .chart-readable .recharts-xAxis .recharts-cartesian-axis-tick line,
      .chart-readable .recharts-yAxis .recharts-cartesian-axis-tick line {
        stroke: rgba(148, 163, 184, 0.6) !important;
      }

      .chart-readable.chart-line-strong .recharts-line-curve {
        stroke-width: 2.5px !important;
      }

      .chart-readable.chart-line-strong .recharts-dot circle {
        r: 3;
        stroke-width: 1px;
      }

      .chart-readable.chart-bar-strong .recharts-bar-rectangle path {
        stroke: rgba(148, 163, 184, 0.25) !important;
        stroke-width: 0.5px !important;
      }

      button[role="combobox"],
      [data-radix-select-trigger] {
        color: #1e293b !important;
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
      }

      [role="listbox"],
      [data-radix-select-content] {
        color: #1e293b !important;
        background-color: #ffffff !important;
        border-color: #e2e8f0 !important;
      }

      [role="option"],
      [data-radix-select-item] {
        color: #1e293b !important;
      }

      [role="option"][data-highlighted],
      [data-radix-select-item][data-highlighted] {
        background-color: #f1f5f9 !important;
        color: #1e293b !important;
      }

      button[role="combobox"] svg {
        color: #64748b !important;
      }

      html.dark .chart-readable .recharts-cartesian-axis-tick-value,
      html.dark .chart-readable .recharts-legend-item-text,
      html.dark .chart-readable .recharts-label,
      html.dark .chart-readable .recharts-text,
      html.dark .chart-readable .recharts-tooltip-label,
      html.dark .chart-readable .recharts-tooltip-item {
        fill: #b5bac1 !important;
        color: #b5bac1 !important;
      }

      html.dark .chart-readable .recharts-cartesian-grid line {
        stroke: rgba(79, 84, 92, 0.45) !important;
      }

      html.dark .chart-readable .recharts-xAxis .recharts-cartesian-axis-line,
      html.dark .chart-readable .recharts-yAxis .recharts-cartesian-axis-line,
      html.dark .chart-readable .recharts-xAxis .recharts-cartesian-axis-tick line,
      html.dark .chart-readable .recharts-yAxis .recharts-cartesian-axis-tick line {
        stroke: rgba(79, 84, 92, 0.65) !important;
      }

      html.dark .chart-readable.chart-bar-strong .recharts-bar-rectangle path {
        stroke: rgba(79, 84, 92, 0.35) !important;
      }

      html.dark button[role="combobox"],
      html.dark [data-radix-select-trigger] {
        color: #f2f3f5 !important;
        background-color: #1e1f22 !important;
        border-color: #1e1f22 !important;
      }

      html.dark [role="listbox"],
      html.dark [data-radix-select-content] {
        color: #f2f3f5 !important;
        background-color: #383a40 !important;
        border-color: #3f4147 !important;
      }

      html.dark [role="option"],
      html.dark [data-radix-select-item] {
        color: #f2f3f5 !important;
      }

      html.dark [role="option"][data-highlighted],
      html.dark [data-radix-select-item][data-highlighted] {
        background-color: #404249 !important;
        color: #f2f3f5 !important;
      }

      html.dark button[role="combobox"] svg {
        color: #b5bac1 !important;
      }
    </style>
  </head>
  <body>
    <script>
      (function () {
        var stored = localStorage.getItem("jedai-theme");
        var dark =
          stored === "dark" ||
          (stored !== "light" && window.matchMedia("(prefers-color-scheme: dark)").matches);
        if (dark) document.documentElement.classList.add("dark");
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
